<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>A Little Library</title>
<style>
  *{box-sizing:border-box}
  body{
    margin:0; min-height:100dvh;
    background:#39342b radial-gradient(120% 90% at 50% 12%, #4a4335 0%, #39342b 55%, #2d2921 100%);
    color:#e6ddc6; font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
    -webkit-text-size-adjust:100%; padding:36px 16px 48px;
  }
  #wrap{max-width:640px; margin:0 auto; display:flex; flex-direction:column; align-items:center; gap:10px}
  .eyebrow{font-size:.64rem; letter-spacing:.24em; text-transform:uppercase; color:#c9a227; text-align:center}
  h1{margin:2px 0 0; font-size:clamp(1.6rem,6vw,2.3rem); font-weight:800; text-align:center; color:#f7f0dd;
     font-family:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Charter,Georgia,serif}
  .rule{color:#c9a227; letter-spacing:.45em; font-size:.9rem; margin:4px 0 0}
  .sub{font-size:.92rem; color:#cfc4a9; margin:0; text-align:center; max-width:46ch}

  .lsel{display:flex; flex-direction:column; gap:8px; font-size:.8rem; color:#cfc4a9; margin:16px 0 4px}
  .lrow{display:flex; align-items:center; gap:8px; justify-content:center}
  .lrow label{min-width:11ch; text-align:right}
  select{font:inherit; padding:6px 10px; border:1px solid #b5a67f; border-radius:8px;
         background:#fbf6e7; color:#2b2418; cursor:pointer}
  select:focus-visible{outline:2px solid #c9a227; outline-offset:1px}

  #shelf{display:grid; grid-template-columns:repeat(auto-fit, minmax(240px, 1fr)); gap:20px; width:100%; margin-top:20px}
  .bookcard{
    display:flex; text-decoration:none; border-radius:6px; background:#f7f0dd; color:#2b2418; padding:14px;
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Charter,Georgia,serif;
    box-shadow:inset 12px 0 16px -13px rgba(60,40,10,.4), inset 0 0 0 1px #efe5c9,
               0 14px 30px rgba(0,0,0,.42), 0 3px 8px rgba(0,0,0,.3);
    transition:transform .18s ease, box-shadow .18s ease;
  }
  .bookcard:hover,.bookcard:focus-visible{
    transform:translateY(-4px);
    box-shadow:inset 12px 0 16px -13px rgba(60,40,10,.4), inset 0 0 0 1px #efe5c9,
               0 20px 38px rgba(0,0,0,.5), 0 5px 12px rgba(0,0,0,.32);
  }
  .bookcard:focus-visible{outline:2px solid #c9a227; outline-offset:3px}
  .bframe{flex:1; border:2.5px solid #2b2418; outline:1.2px solid #2b2418; outline-offset:4px;
          display:flex; flex-direction:column; align-items:center; text-align:center;
          gap:10px; padding:22px 14px 18px}
  .bframe svg{width:86px; height:auto; stroke:#2b2418; fill:none; stroke-width:6;
              stroke-linecap:round; stroke-linejoin:round}
  .btitle{font-size:1.18rem; line-height:1.25; font-weight:800}
  .bsrc{font-family:system-ui; font-size:.74rem; color:#5a4f3b}
</style>
</head>
<body>
<div id="wrap">
  <div class="eyebrow" id="eyeb"></div>
  <h1 id="htitle"></h1>
  <div class="rule">✦ ✦ ✦</div>
  <p class="sub" id="hsub"></p>
  <div class="lsel">
    <div class="lrow"><label for="sel-src" id="lab-src"></label><select id="sel-src"></select></div>
    <div class="lrow"><label for="sel-tgt" id="lab-tgt"></label><select id="sel-tgt"></select></div>
  </div>
  <main id="shelf"></main>
</div>
<script>

/* ================= LANGUAGES & UI STRINGS ================= */
const LANGS = ['en','pt','fr','it','de','es'];
const LNAME_SELF = {en:'English', pt:'Português (BR)', fr:'Français', it:'Italiano', de:'Deutsch', es:'Español'};
// name of the TARGET language written in the SOURCE language.
// fr/it rows carry the article (l'anglais, lo spagnolo) because those grammars
// require it after "apprendre/imparare"; fr/it UI strings are phrased so every
// %L slot composes correctly with the articled form. Other rows stay bare.
const LNAMES = {
  en:{en:'English',pt:'Portuguese',fr:'French',it:'Italian',de:'German',es:'Spanish'},
  pt:{en:'inglês',pt:'português',fr:'francês',it:'italiano',de:'alemão',es:'espanhol'},
  fr:{en:'l’anglais',pt:'le portugais',fr:'le français',it:'l’italien',de:'l’allemand',es:'l’espagnol'},
  it:{en:'l’inglese',pt:'il portoghese',fr:'il francese',it:'l’italiano',de:'il tedesco',es:'lo spagnolo'},
  de:{en:'Englisch',pt:'Portugiesisch',fr:'Französisch',it:'Italienisch',de:'Deutsch',es:'Spanisch'},
  es:{en:'inglés',pt:'portugués',fr:'francés',it:'italiano',de:'alemán',es:'español'}
};
const PAGEWORD = {en:'Page', pt:'Página', fr:'Page', it:'Pagina', de:'Seite', es:'Página'};
const GLOSSTITLE = {en:'Glossary', pt:'Glossário', fr:'Glossaire', it:'Glossario', de:'Glossar', es:'Glosario'};

const UI = {
  en:{eyebrow:'A little book for learning %L', sub:'a story that slowly turns into %L',
      readIn:'I read in', learn:"I'm learning", hint:'turn the page →',
      howtoLabel:'How to read this book', howtoTitle:'Before you begin',
      howtoP:'This little book plays a trick on you — a friendly one. It starts in your language, but %L slips in as you read. Each new word first appears where the context makes its meaning obvious, then returns again and again until it feels like yours. Page by page your language fades, and by the last page you are reading %L.',
      tips:['The first time a new word appears, you will find it in the small note at the bottom of that page.',
            'Later, tap any word you don\u2019t recognize — its meaning pops up. Nothing is highlighted; the words hide in plain sight. Try it now: %W.',
            'Don\u2019t stop to memorize. If you forget a word, the story will remind you — and a tap brings it back.',
            'Swipe or use the arrows to turn the pages. The full glossary is on the last page.'],
      happy:'Happy reading!',
      meta1:'Once upon a time, there were three little pigs. In %L, little pigs are %W — and since this is really their story, that is what we will call them.',
      fnote:'New words', inSent:'in this sentence:', showTr:'Show the translation',
      libEyebrow:'Little books for learning %L', libTitle:'A Little Library',
      libSub:'choose a story — it will slowly turn into %L', lib:'library'},
  pt:{eyebrow:'Um livrinho para aprender %L', sub:'uma história que aos poucos vira %L',
      readIn:'Eu leio em', learn:'Quero aprender', hint:'vire a página →',
      howtoLabel:'Como ler este livro', howtoTitle:'Antes de começar',
      howtoP:'Este livrinho prega uma peça em você — uma peça amiga. Ele começa na sua língua, mas o %L vai entrando enquanto você lê. Cada palavra nova aparece primeiro onde o contexto deixa o sentido óbvio, e depois volta várias vezes até ficar sua. Página a página a sua língua vai sumindo, e na última página você está lendo em %L.',
      tips:['Na primeira vez que uma palavra nova aparece, ela está na notinha no pé da página.',
            'Depois, toque em qualquer palavra que você não reconhecer — o significado aparece. Nada fica destacado; as palavras se escondem à vista. Experimente agora: %W.',
            'Não pare para decorar. Se esquecer uma palavra, a história vai lembrar você — e um toque traz a resposta.',
            'Deslize ou use as setas para virar as páginas. O glossário completo está na última página.'],
      happy:'Boa leitura!',
      meta1:'Era uma vez três porquinhos. Em %L, porquinhos são %W — e como esta história é deles, é assim que vamos chamá-los.',
      fnote:'Palavras novas', inSent:'nesta frase:', showTr:'Mostrar tradução',
      libEyebrow:'Livrinhos para aprender %L', libTitle:'Uma Pequena Biblioteca',
      libSub:'escolha uma história — aos poucos ela vira %L', lib:'biblioteca'},
  fr:{eyebrow:'Un petit livre pour apprendre %L', sub:'une histoire qui glisse peu à peu vers %L',
      readIn:'Je lis en', learn:'J\u2019apprends', hint:'tournez la page →',
      howtoLabel:'Comment lire ce livre', howtoTitle:'Avant de commencer',
      howtoP:'Ce petit livre vous joue un tour — un tour amical. Il commence dans votre langue, mais %L s\u2019y glisse au fil de la lecture. Chaque mot nouveau apparaît d\u2019abord là où le contexte rend son sens évident, puis revient encore et encore jusqu\u2019à devenir vôtre. Page après page votre langue s\u2019efface, et à la dernière page vous lisez %L.',
      tips:['La première fois qu\u2019un mot nouveau apparaît, il figure dans la petite note en bas de la page.',
            'Ensuite, touchez n\u2019importe quel mot que vous ne reconnaissez pas — son sens apparaît. Rien n\u2019est surligné ; les mots se cachent à la vue de tous. Essayez maintenant : %W.',
            'Ne vous arrêtez pas pour mémoriser. Si vous oubliez un mot, l\u2019histoire vous le rappellera — et un simple toucher vous donne la réponse.',
            'Balayez ou utilisez les flèches pour tourner les pages. Le glossaire complet est à la dernière page.'],
      happy:'Bonne lecture !',
      meta1:'Il était une fois trois petits cochons. Pour qui apprend %L, les petits cochons s\u2019appellent %W — et comme c\u2019est leur histoire, c\u2019est ainsi que nous les appellerons.',
      fnote:'Mots nouveaux', inSent:'dans cette phrase :', showTr:'Afficher la traduction',
      libEyebrow:'Des petits livres pour apprendre %L', libTitle:'Une petite bibliothèque',
      libSub:'choisissez une histoire — elle glissera peu à peu vers %L', lib:'bibliothèque'},
  it:{eyebrow:'Un libretto per imparare %L', sub:'una storia che scivola a poco a poco verso %L',
      readIn:'Leggo in', learn:'Sto imparando', hint:'gira la pagina →',
      howtoLabel:'Come leggere questo libro', howtoTitle:'Prima di cominciare',
      howtoP:'Questo libretto ti fa uno scherzo — uno scherzo gentile. Comincia nella tua lingua, ma %L si infila mentre leggi. Ogni parola nuova appare prima dove il contesto ne rende ovvio il significato, poi torna ancora e ancora finché diventa tua. Pagina dopo pagina la tua lingua svanisce, e all\u2019ultima pagina stai leggendo %L.',
      tips:['La prima volta che una parola nuova appare, la trovi nella piccola nota in fondo alla pagina.',
            'Poi, tocca qualsiasi parola che non riconosci — il significato compare. Niente è evidenziato; le parole si nascondono in piena vista. Prova adesso: %W.',
            'Non fermarti a memorizzare. Se dimentichi una parola, la storia te la ricorderà — e un tocco ti dà la risposta.',
            'Scorri o usa le frecce per girare le pagine. Il glossario completo è all\u2019ultima pagina.'],
      happy:'Buona lettura!',
      meta1:'C\u2019erano una volta tre porcellini. Per chi impara %L, i porcellini si chiamano %W — e siccome questa è la loro storia, li chiameremo così.',
      fnote:'Parole nuove', inSent:'in questa frase:', showTr:'Mostra la traduzione',
      libEyebrow:'Piccoli libri per imparare %L', libTitle:'Una piccola biblioteca',
      libSub:'scegli una storia — scivolerà a poco a poco verso %L', lib:'biblioteca'},
  de:{eyebrow:'Ein Büchlein zum %L-Lernen', sub:'eine Geschichte, die langsam %L wird',
      readIn:'Ich lese auf', learn:'Ich lerne', hint:'blättere um →',
      howtoLabel:'Wie man dieses Buch liest', howtoTitle:'Bevor du anfängst',
      howtoP:'Dieses Büchlein spielt dir einen Streich — einen freundlichen. Es beginnt in deiner Sprache, aber %L schleicht sich beim Lesen hinein. Jedes neue Wort erscheint zuerst dort, wo der Zusammenhang seine Bedeutung offensichtlich macht, und kehrt dann wieder und wieder zurück, bis es dir gehört. Seite für Seite verschwindet deine Sprache, und auf der letzten Seite liest du %L.',
      tips:['Wenn ein neues Wort zum ersten Mal auftaucht, steht es in der kleinen Notiz unten auf der Seite.',
            'Später: Tippe auf jedes Wort, das du nicht erkennst — seine Bedeutung erscheint. Nichts ist markiert; die Wörter verstecken sich vor aller Augen. Probier es gleich aus: %W.',
            'Bleib nicht am Auswendiglernen hängen. Wenn du ein Wort vergisst, erinnert dich die Geschichte daran — und ein Tipp gibt dir die Antwort.',
            'Wische oder benutze die Pfeile zum Umblättern. Das vollständige Glossar steht auf der letzten Seite.'],
      happy:'Viel Spaß beim Lesen!',
      meta1:'Es waren einmal drei kleine Schweinchen. Auf %L heißen kleine Schweinchen %W — und weil dies ihre Geschichte ist, nennen wir sie ab jetzt so.',
      fnote:'Neue Wörter', inSent:'in diesem Satz:', showTr:'Übersetzung anzeigen',
      libEyebrow:'Kleine Bücher zum %L-Lernen', libTitle:'Eine kleine Bibliothek',
      libSub:'wähle eine Geschichte — sie wird langsam %L', lib:'Bibliothek'},
  es:{eyebrow:'Un librito para aprender %L', sub:'una historia que poco a poco se convierte en %L',
      readIn:'Yo leo en', learn:'Quiero aprender', hint:'pasa la página →',
      howtoLabel:'Cómo leer este libro', howtoTitle:'Antes de empezar',
      howtoP:'Este librito te juega una broma — una broma amistosa. Empieza en tu idioma, pero el %L se va colando mientras lees. Cada palabra nueva aparece primero donde el contexto deja su significado claro, y luego vuelve una y otra vez hasta que se vuelve tuya. Página a página tu idioma va desapareciendo, y en la última página estás leyendo en %L.',
      tips:['La primera vez que aparece una palabra nueva, la encontrarás en la notita al pie de esa página.',
            'Después, toca cualquier palabra que no reconozcas — su significado aparece. Nada está resaltado; las palabras se esconden a la vista. Pruébalo ahora: %W.',
            'No te detengas a memorizar. Si olvidas una palabra, la historia te la recordará — y un toque te da la respuesta.',
            'Desliza o usa las flechas para pasar las páginas. El glosario completo está en la última página.'],
      happy:'¡Feliz lectura!',
      meta1:'Había una vez tres cerditos. En %L, los cerditos son %W — y como esta es realmente su historia, así los llamaremos.',
      fnote:'Palabras nuevas', inSent:'en esta frase:', showTr:'Mostrar la traducción',
      libEyebrow:'Libritos para aprender %L', libTitle:'Una pequeña biblioteca',
      libSub:'elige una historia — poco a poco se convertirá en %L', lib:'biblioteca'}
};


/* injected by build.js: [{file, title:{en,pt,fr,it,de,es}, art:'<svg…>'}] */
const BOOKS = [{"file":"jack-and-the-beanstalk","title":{"en":"Jack and the Beanstalk","pt":"João e o Pé de Feijão","fr":"Jack et le Haricot magique","it":"Jack e la Pianta di Fagioli","de":"Hans und die Bohnenranke","es":"Juan y las Habichuelas Mágicas"},"art":"<svg class=\"pig\" viewBox=\"0 0 200 145\" aria-hidden=\"true\"><path d=\"M100 142 C 90 112, 114 96, 103 70 C 93 50, 112 34, 103 8\"/><path d=\"M102 72 q-18 -4 -27 -19 q21 -2 27 11\"/><path d=\"M100 116 q17 -6 23 -21 q-21 0 -24 13\"/><path d=\"M104 42 q-16 -2 -25 -15 q19 -2 25 7\"/><ellipse cx=\"47\" cy=\"20\" rx=\"27\" ry=\"10\"/><ellipse cx=\"155\" cy=\"33\" rx=\"30\" ry=\"11\"/></svg>"},{"file":"three-little-pigs","title":{"en":"The Three Little Pigs","pt":"Os Três Porquinhos","fr":"Les Trois Petits Cochons","it":"I Tre Porcellini","de":"Die drei kleinen Schweinchen","es":"Los Tres Cerditos"},"art":"<svg class=\"pig\" viewBox=\"0 0 200 145\" aria-hidden=\"true\"><ellipse cx=\"108\" cy=\"80\" rx=\"60\" ry=\"42\"/><circle cx=\"52\" cy=\"70\" r=\"30\"/><ellipse cx=\"32\" cy=\"74\" rx=\"10\" ry=\"8\"/><path d=\"M29 72 v4 M36 72 v4\"/><path d=\"M40 46 L33 26 L55 38\"/><path d=\"M61 42 L64 21 L78 37\"/><circle cx=\"52\" cy=\"61\" r=\"2.6\" fill=\"#2b2418\" stroke=\"none\"/><path d=\"M82 119 v16 M104 122 v15 M128 121 v16 M150 112 v16\"/><path d=\"M167 72 q16 -8 11 4 q-5 11 9 7\"/></svg>"}];

let SRC='en', TGT='pt';
try{
  const q=new URLSearchParams(location.search);
  if(LANGS.includes(q.get('src'))) SRC=q.get('src');
  if(LANGS.includes(q.get('tgt')) && q.get('tgt')!==SRC) TGT=q.get('tgt');
  if(TGT===SRC) TGT = SRC==='pt' ? 'en' : 'pt';
}catch(e){}

const $id=i=>document.getElementById(i);
function fillSel(sel,val){
  sel.innerHTML='';
  LANGS.forEach(L=>{ const o=document.createElement('option'); o.value=L; o.textContent=LNAME_SELF[L]; sel.appendChild(o); });
  sel.value=val;
}
function render(){
  document.documentElement.lang=SRC;
  document.title=UI[SRC].libTitle;
  $id('eyeb').textContent=UI[SRC].libEyebrow.replace('%L', LNAMES[SRC][TGT]);
  $id('htitle').textContent=UI[SRC].libTitle;
  $id('hsub').textContent=UI[SRC].libSub.replace('%L', LNAMES[SRC][TGT]);
  $id('lab-src').textContent=UI[SRC].readIn;
  $id('lab-tgt').textContent=UI[SRC].learn;
  fillSel($id('sel-src'),SRC); fillSel($id('sel-tgt'),TGT);
  const shelf=$id('shelf'); shelf.innerHTML='';
  BOOKS.forEach(b=>{
    const a=document.createElement('a');
    a.className='bookcard';
    a.href='dist/'+b.file+'.html?src='+SRC+'&tgt='+TGT;
    const fr=document.createElement('div'); fr.className='bframe';
    fr.innerHTML=b.art;                                   // build-time trusted SVG
    const t=document.createElement('div'); t.className='btitle'; t.textContent=b.title[TGT];
    fr.appendChild(t);
    if(b.title[SRC]!==b.title[TGT]){
      const s=document.createElement('div'); s.className='bsrc'; s.textContent=b.title[SRC];
      fr.appendChild(s);
    }
    a.appendChild(fr); shelf.appendChild(a);
  });
}
document.addEventListener('change',e=>{
  if(e.target.id==='sel-src'){ const old=SRC; SRC=e.target.value; if(SRC===TGT) TGT=old; render(); }
  else if(e.target.id==='sel-tgt'){ const old=TGT; TGT=e.target.value; if(TGT===SRC) SRC=old; render(); }
});
render();
</script>
</body>
</html>
