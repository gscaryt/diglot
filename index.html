<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>The Three Little Pigs — a progressive bilingual reader</title>
<style>
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; height:100dvh; display:flex; flex-direction:column; overflow:hidden;
    background:#39342b radial-gradient(120% 90% at 50% 12%, #4a4335 0%, #39342b 55%, #2d2921 100%);
    color:#e6ddc6; font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
    touch-action:manipulation; -webkit-text-size-adjust:100%;
  }
  #stage{flex:1; min-height:0; display:flex; justify-content:center; padding:14px 12px 6px}
  #book{position:relative; width:min(540px,100%); perspective:1600px}

  .page{
    position:absolute; inset:0; overflow-y:auto; border-radius:6px;
    background:#f7f0dd; color:#2b2418; padding:24px 24px 30px;
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Charter,Georgia,serif;
    font-size:1.02rem; line-height:1.68;
    box-shadow:inset 14px 0 18px -14px rgba(60,40,10,.35), inset 0 0 0 1px #efe5c9,
               0 16px 34px rgba(0,0,0,.45), 0 3px 8px rgba(0,0,0,.3);
  }
  .page p{margin:0 0 1em}
  .page h2{font-size:1.32rem; margin:0 0 .8em; font-weight:700}
  .plabel{font-family:system-ui; font-size:.66rem; letter-spacing:.2em; text-transform:uppercase; color:#96865f; margin:0 0 16px}
  ul{padding-left:1.15em; margin:0 0 1em}
  li{margin-bottom:.6em}

  /* tappable words — identical to body text on purpose */
  .w{cursor:pointer; -webkit-tap-highlight-color:transparent; border-radius:3px; transition:background .45s}
  .w.hit{background:rgba(30,94,70,.18)}
  .w:focus-visible{outline:1.5px dashed #b5a67f; outline-offset:1px}

  /* first-appearance footnotes: present but quiet */
  .fnote{margin-top:1.8em; padding-top:.65em; border-top:1px solid #e4d8b6;
         font-family:system-ui; font-size:.72rem; line-height:1.6; color:#96865f}
  .fnote b{font-weight:600; color:#6f6142}
  .fnote .fl{letter-spacing:.14em; text-transform:uppercase; font-size:.62rem; margin-right:.5em}

  /* page-flip leaf */
  .leaf{position:absolute; inset:0; z-index:10; transform-style:preserve-3d;
        transition:transform .62s cubic-bezier(.45,.05,.2,1)}
  .face{backface-visibility:hidden; -webkit-backface-visibility:hidden; overflow:hidden !important}
  .face.back{transform:rotateY(180deg)}
  @media (prefers-reduced-motion: reduce){ .leaf{transition:none} }

  /* cover */
  .page.cover{display:flex; padding:18px}
  .frame{flex:1; border:3px solid #2b2418; outline:1.5px solid #2b2418; outline-offset:5px;
         display:flex; flex-direction:column; align-items:center; justify-content:center;
         gap:12px; text-align:center; padding:22px 14px}
  .eyebrow{font-family:system-ui; font-size:.62rem; letter-spacing:.24em; text-transform:uppercase; color:#1e5e46}
  .cover h1{font-size:clamp(1.7rem,6.8vw,2.5rem); line-height:1.1; margin:0; font-weight:800}
  .rule{color:#c9a227; letter-spacing:.45em; font-size:.9rem}
  .sub{font-size:.92rem; color:#5a4f3b; max-width:36ch; margin:0}
  .hint{font-family:system-ui; font-size:.74rem; letter-spacing:.06em; color:#96865f; margin:2px 0 0}
  svg.pig{width:104px; height:auto; stroke:#2b2418; fill:none; stroke-width:6; stroke-linecap:round; stroke-linejoin:round}

  /* language pair selector */
  .lsel{display:flex; flex-direction:column; gap:8px; font-family:system-ui; font-size:.8rem; color:#5a4f3b; margin-top:4px}
  .lrow{display:flex; align-items:center; gap:8px; justify-content:center}
  .lrow label{min-width:9ch; text-align:right}
  select{font:inherit; padding:6px 10px; border:1px solid #b5a67f; border-radius:8px;
         background:#fbf6e7; color:#2b2418; cursor:pointer}
  select:focus-visible{outline:2px solid #c9a227; outline-offset:1px}

  /* translation reveal on the last page */
  .trbtn{font-family:system-ui; font-size:.8rem; letter-spacing:.04em; color:#5a4f3b;
         background:#f1e8d0; border:1px solid #b5a67f; border-radius:20px; padding:8px 15px; cursor:pointer}
  .trbtn:focus-visible{outline:2px solid #c9a227; outline-offset:2px}
  .tr{background:#f1e8d0; border-radius:8px; padding:12px 14px; font-size:.92rem; color:#4b4232; margin-top:.9em}

  /* glossary */
  .gloss .cols{font-family:system-ui; font-size:.88rem; line-height:1.5}
  .gloss .cols p{margin:0 0 7px; break-inside:avoid}
  .pref{color:#96865f; font-size:.76rem}
  @media (min-width:460px){ .gloss .cols{columns:2; column-gap:24px} }

  /* definition pop-up */
  #sheet{
    position:fixed; left:50%; bottom:84px; z-index:50;
    transform:translate(-50%,150%); opacity:0; pointer-events:none;
    transition:transform .28s ease, opacity .28s ease;
    background:#fbf6e7; color:#2b2418; border:1px solid #d8c9a4; border-radius:12px;
    box-shadow:0 12px 28px rgba(0,0,0,.42); padding:12px 42px 13px 16px;
    width:max-content; max-width:min(440px, calc(100vw - 28px));
  }
  #sheet.open{transform:translate(-50%,0); opacity:1; pointer-events:auto}
  #sw{font-family:"Iowan Old Style","Palatino Linotype",Palatino,Charter,Georgia,serif;
      font-weight:700; font-size:1.18rem; color:#1e5e46}
  #sd{font-size:.92rem; color:#4b4232; margin-top:2px}
  #sd .fb{display:block; font-size:.78rem; color:#96865f; margin-bottom:1px}
  #sx{position:absolute; top:5px; right:7px; background:none; border:0; font-size:1.15rem;
      color:#96865f; cursor:pointer; padding:4px}
  @media (prefers-reduced-motion: reduce){ #sheet{transition:none} }

  /* nav */
  footer{display:flex; align-items:center; justify-content:center; gap:20px;
         padding:10px 12px calc(12px + env(safe-area-inset-bottom))}
  .nav{width:46px; height:46px; border-radius:50%; border:1px solid #6b6250;
       background:#f7f0dd; color:#2b2418; font-size:1.45rem; line-height:1; cursor:pointer;
       box-shadow:0 3px 8px rgba(0,0,0,.35)}
  .nav:disabled{opacity:.32; cursor:default}
  .nav:focus-visible{outline:2px solid #c9a227; outline-offset:2px}
  #ind{min-width:74px; text-align:center; font-size:.84rem; letter-spacing:.1em; color:#cfc4a9}
</style>
</head>
<body>

<div id="stage"><div id="book"><div id="pg" class="page"></div></div></div>

<footer>
  <button id="prev" class="nav" aria-label="Previous page">‹</button>
  <div id="ind" aria-live="polite"></div>
  <button id="next" class="nav" aria-label="Next page">›</button>
</footer>

<div id="sheet" role="dialog" aria-live="polite">
  <div id="sw"></div>
  <div id="sd"></div>
  <button id="sx" aria-label="Close">×</button>
</div>

/*ENGINE*/
const LK = {en:'e',pt:'p',fr:'f',it:'i',de:'d',es:'s'};
const WORD = /[\p{L}\p{M}]+(?:-[\p{L}\p{M}]+)*/gu;
let SRC='en', TGT='pt', cur=0, anim=false;
const TOTAL = PAGES.length + 3; // cover + how-to + story + glossary
const RM = matchMedia('(prefers-reduced-motion: reduce)').matches;

const book=document.getElementById('book'), pageEl=document.getElementById('pg'),
      ind=document.getElementById('ind'), prevB=document.getElementById('prev'),
      nextB=document.getElementById('next'), sheet=document.getElementById('sheet'),
      sw=document.getElementById('sw'), sd=document.getElementById('sd');

function X(seg,lang){ return seg.c ? C[seg.c][lang] : seg.x[LK[lang]]; }
function esc(s){ return s.replace(/[&<>"]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function el(tag,cls,txt){ const n=document.createElement(tag); if(cls)n.className=cls; if(txt!=null)n.textContent=txt; return n; }

// wrap target-language text into tappable word spans inside container
function words(container, text){
  let last=0;
  for(const m of text.matchAll(WORD)){
    if(m.index>last) container.appendChild(document.createTextNode(text.slice(last,m.index)));
    const sp=el('span','w',m[0]); sp.tabIndex=0; sp.setAttribute('role','button');
    container.appendChild(sp); last=m.index+m[0].length;
  }
  container.appendChild(document.createTextNode(text.slice(last)));
}

function targetSpan(seg){
  const holder=el('span');
  holder.dataset.src = X(seg,SRC).trim();
  words(holder, X(seg,TGT));
  if(seg.g) holder.appendChild(document.createTextNode(' — '+X(seg,SRC).trim()));
  return holder;
}

/* ---------- page builders ---------- */
function buildCover(root){
  root.className='page cover';
  const fr=el('div','frame');
  fr.appendChild(el('div','eyebrow', UI[SRC].eyebrow.replace('%L', LNAMES[SRC][TGT])));
  const h1=document.createElement('h1');
  const tSeg={f:1,x:{e:TITLE.en,p:TITLE.pt,f:TITLE.fr,i:TITLE.it,d:TITLE.de,s:TITLE.es}};
  h1.appendChild(targetSpan(tSeg));
  fr.appendChild(h1);
  fr.appendChild(el('div','rule','✦ ✦ ✦'));
  fr.appendChild(el('p','sub', UI[SRC].sub.replace('%L', LNAMES[SRC][TGT])));
  const ls=el('div','lsel');
  [['sel-src',UI[SRC].readIn,SRC],['sel-tgt',UI[SRC].learn,TGT]].forEach(([id,lab,val])=>{
    const row=el('div','lrow'); const l=el('label',null,lab); l.htmlFor=id;
    const sel=document.createElement('select'); sel.id=id;
    LANGS.forEach(L=>{ const o=document.createElement('option'); o.value=L; o.textContent=LNAME_SELF[L]; if(L===val)o.selected=true; sel.appendChild(o); });
    row.appendChild(l); row.appendChild(sel); ls.appendChild(row);
  });
  fr.appendChild(ls);
  fr.insertAdjacentHTML('beforeend',
   '<svg class="pig" viewBox="0 0 200 145" aria-hidden="true"><ellipse cx="108" cy="80" rx="60" ry="42"/><circle cx="52" cy="70" r="30"/><ellipse cx="32" cy="74" rx="10" ry="8"/><path d="M29 72 v4 M36 72 v4"/><path d="M40 46 L33 26 L55 38"/><path d="M61 42 L64 21 L78 37"/><circle cx="52" cy="61" r="2.6" fill="#2b2418" stroke="none"/><path d="M82 119 v16 M104 122 v15 M128 121 v16 M150 112 v16"/><path d="M167 72 q16 -8 11 4 q-5 11 9 7"/></svg>');
  fr.appendChild(el('p','hint', UI[SRC].hint));
  root.appendChild(fr);
}

function buildHowto(root){
  root.className='page story';
  root.appendChild(el('div','plabel', UI[SRC].howtoLabel));
  root.appendChild(el('h2',null, UI[SRC].howtoTitle));
  root.appendChild(el('p',null, UI[SRC].howtoP.replaceAll('%L', LNAMES[SRC][TGT])));
  const ul=document.createElement('ul');
  UI[SRC].tips.forEach(t=>{
    const li=document.createElement('li');
    if(t.includes('%W')){
      const [a,b]=t.split('%W');
      li.appendChild(document.createTextNode(a));
      li.appendChild(targetSpan({f:1,c:'PIGS'}));
      li.appendChild(document.createTextNode(b));
    } else li.textContent=t;
    ul.appendChild(li);
  });
  root.appendChild(ul);
  root.appendChild(el('p',null, UI[SRC].happy));
}

function buildStory(root, pi){
  const page=PAGES[pi];
  root.className='page story';
  root.appendChild(el('div','plabel', PAGEWORD[TGT]+' '+(pi+1)));
  const intros=[];
  page.ps.forEach(para=>{
    const p=document.createElement('p');
    para.forEach(seg=>{
      if(seg.m){ // templated opening sentence
        intros.push('PIGS');
        const tpl=UI[SRC].meta1.replace('%L', LNAMES[SRC][TGT]);
        const [a,b]=tpl.split('%W');
        p.appendChild(document.createTextNode(a));
        p.appendChild(targetSpan({f:1,c:'PIGS'}));
        p.appendChild(document.createTextNode(b));
        return;
      }
      if(seg.n) intros.push(...seg.n);
      if(seg.f===0){ p.appendChild(document.createTextNode(X(seg,SRC))); return; }
      const t=targetSpan(seg);
      if(seg.b){ const bb=document.createElement('b'); bb.appendChild(t); p.appendChild(bb); }
      else p.appendChild(t);
    });
    root.appendChild(p);
  });
  if(page.tr){ // final page: full translation instead of footnotes
    const btn=el('button','trbtn', UI[SRC].showTr);
    const tr=el('p','tr'); tr.hidden=true; tr.style.whiteSpace='pre-line';
    tr.textContent = page.ps.map(para=>para.map(s=>X(s,SRC)).join('')).join('\n\n');
    root.appendChild(btn); root.appendChild(tr);
  } else if(intros.length){
    const fn=el('div','fnote');
    fn.innerHTML='<span class="fl">'+esc(UI[SRC].fnote)+'</span>'+
      intros.map(c=>'<b>'+esc(C[c][TGT])+'</b> — '+esc(C[c][SRC])).join(' · ');
    root.appendChild(fn);
  }
}

function buildGloss(root){
  root.className='page gloss';
  root.appendChild(el('div','plabel', GLOSSTITLE[TGT]));
  root.appendChild(el('h2',null, GLOSSTITLE[TGT]));
  const seen=new Map();
  PAGES.forEach((page,pi)=>{
    page.ps.flat().forEach(seg=>{
      if(seg.m && !seen.has('PIGS')) seen.set('PIGS', pi+1);
      (seg.n||[]).forEach(c=>{ if(!seen.has(c)) seen.set(c, pi+1); });
    });
  });
  const cols=el('div','cols');
  [...seen.entries()]
    .sort((a,b)=>C[a[0]][TGT].localeCompare(C[b[0]][TGT], TGT))
    .forEach(([c,pg])=>{
      const p=document.createElement('p');
      p.innerHTML='<b>'+esc(C[c][TGT])+'</b> — '+esc(C[c][SRC])+' <span class="pref">p. '+pg+'</span>';
      cols.appendChild(p);
    });
  root.appendChild(cols);
}

/* ---------- fill / flip / nav ---------- */
function fill(root, idx){
  root.innerHTML=''; root.className='page';
  if(idx===0) buildCover(root);
  else if(idx===1) buildHowto(root);
  else if(idx===TOTAL-1) buildGloss(root);
  else buildStory(root, idx-2);
  root.scrollTop=0;
}
function update(){
  ind.textContent=(cur+1)+' / '+TOTAL;
  prevB.disabled=cur===0; nextB.disabled=cur===TOTAL-1;
}
function go(n){
  if(anim || n<0 || n>=TOTAL || n===cur) return;
  hideSheet();
  if(RM){ fill(pageEl,n); cur=n; update(); return; }
  anim=true;
  const fwd=n>cur, oldCls=pageEl.className, oldHTML=pageEl.innerHTML;
  fill(pageEl,n);
  const leaf=el('div','leaf'), f=document.createElement('div'), b=document.createElement('div');
  if(fwd){ f.className=oldCls+' face front'; f.innerHTML=oldHTML;
           b.className=pageEl.className+' face back'; b.innerHTML=pageEl.innerHTML;
           leaf.style.transform='rotateY(0deg)'; }
  else   { f.className=pageEl.className+' face front'; f.innerHTML=pageEl.innerHTML;
           b.className=oldCls+' face back'; b.innerHTML=oldHTML;
           leaf.style.transform='rotateY(-180deg)'; }
  leaf.appendChild(f); leaf.appendChild(b); book.appendChild(leaf);
  leaf.getBoundingClientRect();
  leaf.style.transform = fwd?'rotateY(-180deg)':'rotateY(0deg)';
  leaf.addEventListener('transitionend',()=>{ leaf.remove(); anim=false; },{once:true});
  setTimeout(()=>{ if(leaf.isConnected){ leaf.remove(); anim=false; } },900);
  cur=n; update();
}

/* ---------- popup ---------- */
function showDef(w){
  const tok=w.textContent, cid=TOKENS[TGT][tok.toLowerCase()];
  sw.textContent=tok;
  if(cid){ sd.textContent=C[cid][SRC]; }
  else{
    const src=(w.closest('[data-src]')||{}).dataset ? w.closest('[data-src]').dataset.src : '';
    sd.innerHTML='<span class="fb">'+esc(UI[SRC].inSent)+'</span>'+esc(src);
  }
  sheet.classList.add('open');
  w.classList.add('hit'); setTimeout(()=>w.classList.remove('hit'),700);
}
function hideSheet(){ sheet.classList.remove('open'); }

/* ---------- events ---------- */
document.addEventListener('click',e=>{
  const tb=e.target.closest('.trbtn');
  if(tb){ const t=tb.nextElementSibling; t.hidden=!t.hidden; return; }
  const w=e.target.closest('.w');
  if(w){ showDef(w); return; }
  if(!e.target.closest('#sheet') && !e.target.closest('select')) hideSheet();
});
document.getElementById('sx').addEventListener('click',hideSheet);
document.addEventListener('change',e=>{
  if(e.target.id==='sel-src'){ const old=SRC; SRC=e.target.value; if(SRC===TGT) TGT=old; fill(pageEl,cur); update(); }
  else if(e.target.id==='sel-tgt'){ const old=TGT; TGT=e.target.value; if(TGT===SRC) SRC=old; fill(pageEl,cur); update(); }
});
prevB.addEventListener('click',()=>go(cur-1));
nextB.addEventListener('click',()=>go(cur+1));
addEventListener('keydown',e=>{
  if(e.target.classList && e.target.classList.contains('w') && (e.key==='Enter'||e.key===' ')){
    e.preventDefault(); showDef(e.target); return;
  }
  if(e.target.tagName==='SELECT') return;
  if(e.key==='ArrowRight') go(cur+1);
  else if(e.key==='ArrowLeft') go(cur-1);
  else if(e.key==='Escape') hideSheet();
});
let tx=0,ty=0;
book.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
book.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>60 && Math.abs(dx)>1.6*Math.abs(dy)) go(cur+(dx<0?1:-1));
},{passive:true});

fill(pageEl,0); update();
</script>
